backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "homepage"
    label: "Edit Website Content"
    delete: false
    editor:
      preview: false
    files:
      - file: "content.json"
        label: "Homepage Text and Images"
        name: "index"
        fields:
          - {label: "Main Hero Headline", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle Text", name: "heroSubtitle", widget: "text"}
          - {label: "Contact Email", name: "email", widget: "string"}
          - {label: "Contact Phone", name: "phone", widget: "string"}
          - {label: "Your Catalogues", name: "catalogues", widget: "list", fields: [
              {label: "Catalogue Name (e.g., Modular Kitchens)", name: "category", widget: "string"},
              {label: "Upload Catalogue Photos", name: "photos", widget: "list", field: {label: "Photo", name: "image", widget: "image"}}
            ]}
